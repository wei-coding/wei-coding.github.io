language: node_js
sudo: false
branches:
  only:
    - master
cache:
  - npm
before_script:
  - npm install
  - hexo cl
  - git clone https://github.com/theme-next/hexo-theme-next.git themes/next
script:
  - hexo generate
deploy:
  provider: pages
  skip-cleanup: true
  github-token: $GH_TOKEN
  local-dir: public
  keep-history: false
  on:
    branch: master