language: node_js
node_js:
  - '12'
sudo: false
branches:
  only:
    - master
cache:
  apt: true
  directories:
    - node_modules
before_script:
  - npm install hexo-cli -g
  - git clone https://github.com/theme-next/hexo-theme-next.git themes/next
script:
  - hexo generate
deploy:
  provider: pages
  skip-cleanup: true
  github-token: $GH_TOKEN
  local-dir: public
  keep-history: false
  on:
    branch: master